; ─────────────────────────────────────────────────────────────────────────────
;  PlatformIO project configuration for OeffiClient
;  Adjust board, framework and monitor_speed to match your hardware.
; ─────────────────────────────────────────────────────────────────────────────

[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

monitor_speed = 115200

; ArduinoJson – required for JSON parsing
; Use the latest v6 release for DynamicJsonDocument support.
lib_deps =
    bblanchon/ArduinoJson @ ^6.21.4

build_flags =
    -DCORE_DEBUG_LEVEL=1

; Increase stack size if you encounter stack overflows on large JSON documents
; board_build.partitions = min_spiffs.csv
